version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: jobai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: jobai
      POSTGRES_PASSWORD: jobai_secret
      POSTGRES_DB: jobai_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: jobai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  pgdata:
